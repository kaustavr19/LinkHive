<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-primary/70 backdrop-blur-md transition-opacity">
<!-- Modal Base (Dark Theme using designated config colors) -->
<!-- bg-tertiary-container represents the #1A1A1A dark background requested, using system tokens -->
<div class="w-full max-w-[480px] bg-tertiary-container rounded-xl shadow-2xl flex flex-col overflow-hidden transform transition-all scale-100">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-outline/20">
<h2 class="font-headline-md text-headline-md text-on-tertiary">Add new link</h2>
<button aria-label="Close modal" class="text-on-tertiary-container hover:text-on-tertiary transition-colors rounded-full p-1 hover:bg-on-tertiary/10 outline-none focus-visible:ring-2 focus-visible:ring-primary-fixed">
<span class="material-symbols-outlined" style="font-size: 20px;">close</span>
</button>
</div>
<!-- Body -->
<div class="px-6 py-6 flex flex-col gap-6">
<!-- URL Input -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-tertiary-container" for="url-input">URL</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-tertiary-container" style="font-size: 18px;">link</span>
<input autocomplete="off" class="w-full bg-inverse-surface border border-outline-variant/40 rounded-lg py-2.5 pl-10 pr-4 font-body-base text-body-base text-on-tertiary placeholder:text-on-tertiary-container/50 focus:border-outline focus:ring-1 focus:ring-outline outline-none transition-all" id="url-input" placeholder="https://example.com" type="url"/>
</div>
</div>
<!-- Title Input -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-tertiary-container" for="title-input">Title <span class="text-on-tertiary-container/50 font-normal">(Optional)</span></label>
<input class="w-full bg-inverse-surface border border-outline-variant/40 rounded-lg px-4 py-2.5 font-body-base text-body-base text-on-tertiary placeholder:text-on-tertiary-container/50 focus:border-outline focus:ring-1 focus:ring-outline outline-none transition-all" id="title-input" placeholder="Leave blank to auto-fetch" type="text"/>
</div>
<!-- Category/Folder Tag (Minimalist representation) -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-tertiary-container">Save to</label>
<div class="flex items-center gap-2">
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-inverse-surface border border-outline-variant/30 text-on-tertiary-container hover:text-on-tertiary hover:border-outline-variant/60 transition-colors font-label-sm text-label-sm">
<span class="material-symbols-outlined" style="font-size: 16px;">folder</span>
                            Uncategorized
                            <span class="material-symbols-outlined ml-1" style="font-size: 14px;">expand_more</span>
</button>
</div>
</div>
</div>
