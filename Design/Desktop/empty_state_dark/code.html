<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LinkHive - Empty State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "surface-variant": "#e2e2e2",
                        "on-primary-container": "#858383",
                        "primary-fixed": "#e5e2e1",
                        "error": "#ba1a1a",
                        "inverse-surface": "#2f3131",

                        "surface-container-high": "#e8e8e8",

                        "surface-dim": "#dadada",
                        "secondary": "#5d5f5f",

                        "surface": "#f9f9f9",

                    },
                    "fontFamily": {
                        "body-medium": ["Inter"],

                    "fontSize": {

                }
            }
        }

<style>
        body {
            background-color: #0D0D0D; /* Near-black background for dark mode empty state request */
            color: #ffffff; /* High contrast white text */
        }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center">
<!-- Sidebar Shell - Intentionally suppressed for empty state focus, or could be kept if it's an empty category. Assuming a completely empty app state based on prompt for maximum focus. Let's include the shell but dim it to focus on the empty state. -->
<!-- Main Content Area - Centered Empty State -->
<main class="flex-1 flex flex-col items-center justify-center p-8 w-full max-w-[800px] mx-auto text-center">
<!-- Minimal Dim Grey Illustration (Using a styled icon/container to represent this) -->
<div class="mb-8 p-12 rounded-full bg-[#1A1A1A] border border-[#2A2A2A] shadow-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-[64px] text-[#4A4A4A]" style="font-variation-settings: 'FILL' 0, 'wght' 200;">
                archive
            </span>
</div>
<!-- High contrast white text for headline -->
<h1 class="font-display-hero text-display-hero text-white mb-4">
            Nothing here yet
        </h1>
<p class="font-body-base text-body-base text-[#888888] max-w-md mx-auto mb-10">
            Your saved links, articles, and media will appear here. Start curating your personal knowledge base by adding your first item.
        </p>
<!-- Primary Button Prominent -->
<button class="bg-white text-black font-body-medium text-body-medium py-3 px-8 rounded-lg hover:bg-gray-200 transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">add</span>
            Add your first link
        </button>
</main>
</body></html>
