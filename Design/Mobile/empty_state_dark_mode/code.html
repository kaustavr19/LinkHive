<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LinkHive - Empty Home</title>

                    "on-error": "#ffffff",
                    "on-primary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed-variant": "#454747",
                    "primary-fixed": "#e5e2e1",

                    "on-primary-fixed": "#1c1b1b",
                    "primary": "#000000",

                    "on-tertiary-container": "#868381",
                    "tertiary": "#000000",

                    "surface-container": "#efeded",
                    "surface": "#fbf9f8",
                    "on-background": "#1b1c1c",

                    "inverse-on-surface": "#f2f0f0",
                    "on-tertiary": "#ffffff",
                    "outline-variant": "#c4c7c7",

            "spacing": {

                    "container-margin": "16px",

            "fontFamily": {

<style>
        body {
            background-color: #1A1A1A; /* Forcing true dark mode background as requested in prompt despite config */
            color: #E2E2E2;
        }
        /* Custom dark mode utility overrides since standard config was light-centric */
        .dark .bg-surface-dark { background-color: #1A1A1A; }
        .dark .text-on-surface-dark { color: #E2E2E2; }
        .dark .text-muted-dark { color: #858383; }
        .dark .bg-surface-container-dark { background-color: #262626; }
        .dark .bg-primary-dark { background-color: #E5E2E1; }
        .dark .text-on-primary-dark { color: #1C1B1B; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dark text-on-surface-dark min-h-screen flex flex-col font-body-md antialiased selection:bg-surface-container-highest selection:text-primary">
<!-- Offline Sync Indicator (Subtle top bar) -->
<div class="h-[2px] w-full bg-surface-container-dark overflow-hidden fixed top-0 left-0 z-[60]">
<div class="h-full bg-primary-dark w-1/3 animate-[pulse_2s_ease-in-out_infinite] opacity-50"></div>
</div>
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-container-margin h-14 z-50 bg-surface-dark text-primary-fixed sticky top-0 shadow-none transition-all duration-300">
<button aria-label="Menu" class="p-2 -ml-2 rounded-full hover:bg-surface-container-highest transition-colors flex items-center justify-center text-primary-fixed">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary-fixed tracking-tight">LinkHive</h1>
<button aria-label="Account" class="p-2 -mr-2 rounded-full hover:bg-surface-container-highest transition-colors flex items-center justify-center text-primary-fixed">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">account_circle</span>
</button>
</header>
<!-- Main Content Canvas - Empty State -->
<main class="flex-1 flex flex-col items-center justify-center px-container-margin pb-24 pt-8 text-center">
<!-- Illustration Area (Placeholder for actual illustration, using a stylized icon representation) -->
<div class="relative w-48 h-48 mb-8 flex items-center justify-center">
<!-- Subtle background glow -->
<div class="absolute inset-0 bg-primary-fixed opacity-5 rounded-full blur-2xl"></div>
<div class="relative z-10 opacity-80 transition-transform duration-700 ease-in-out hover:scale-105">
<!-- Using a composition of material icons to simulate a 'hive' or empty state illustration -->
<span class="material-symbols-outlined text-[80px] text-primary-fixed opacity-20 absolute -top-4 -left-4 rotate-12">hive</span>
<span class="material-symbols-outlined text-[120px] text-primary-fixed" style="font-variation-settings: 'wght' 200;">hexagon</span>
<span class="material-symbols-outlined text-[40px] text-surface-container-dark absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">link_off</span>
</div>
<!-- Floating particles effect (CSS only) -->
<div class="absolute w-2 h-2 rounded-full bg-primary-fixed opacity-20 top-4 left-8 animate-[bounce_3s_infinite]"></div>
<div class="absolute w-1 h-1 rounded-full bg-primary-fixed opacity-30 bottom-12 right-10 animate-[pulse_2s_infinite]"></div>
<div class="absolute w-1.5 h-1.5 rounded-full bg-primary-fixed opacity-10 top-1/2 -right-2 animate-[bounce_4s_infinite_delay-1s]"></div>
</div>
<!-- Copy -->
<h2 class="font-headline-sm text-headline-sm text-on-surface-dark mb-base">Your hive is empty</h2>
<p class="font-body-md text-body-md text-muted-dark max-w-[280px] mx-auto mb-xl">
            Start saving your important links, articles, and inspiration to build your collection.
        </p>
<!-- Subtle hint -->
<div class="flex items-center gap-2 text-muted-dark opacity-60">
<span class="font-label-xs text-label-xs uppercase tracking-widest">Tap the</span>
<span class="material-symbols-outlined text-[14px]">add_circle</span>
<span class="font-label-xs text-label-xs uppercase tracking-widest">to begin</span>
</div>
</main>
<!-- Floating Action Button (FAB) -->
<button aria-label="Save new link" class="fixed bottom-20 right-container-margin w-14 h-14 bg-primary-dark text-on-primary-dark rounded-full flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-all duration-200 z-40 group">
<span class="material-symbols-outlined text-on-primary-dark group-hover:rotate-90 transition-transform duration-300" style="font-variation-settings: 'wght' 500;">add</span>
</button>
<!-- BottomNavBar (Desktop Hidden, Mobile Visible) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface-container-dark shadow-[0_-1px_0_0_rgba(255,255,255,0.05)] md:hidden h-[56px]">
<!-- Active Tab: home -->
<a aria-current="page" aria-label="Home" class="flex flex-col items-center justify-center bg-primary-dark text-on-primary-dark rounded-full w-12 h-8 transition-all hover:bg-on-surface-variant active:scale-90 duration-200 group" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</a>
<!-- Inactive Tab: link -->
<a aria-label="Links" class="flex flex-col items-center justify-center text-muted-dark w-12 h-8 transition-all hover:bg-surface-variant/10 rounded-full active:scale-90 duration-200 group" href="#">
<span class="material-symbols-outlined group-hover:text-primary-fixed transition-colors" style="font-variation-settings: 'FILL' 0;">link</span>
</a>
<!-- Inactive Tab: content_paste -->
<a aria-label="Clipboard" class="flex flex-col items-center justify-center text-muted-dark w-12 h-8 transition-all hover:bg-surface-variant/10 rounded-full active:scale-90 duration-200 group" href="#">
<span class="material-symbols-outlined group-hover:text-primary-fixed transition-colors" style="font-variation-settings: 'FILL' 0;">content_paste</span>
</a>
<!-- Inactive Tab: target -->
<a aria-label="Targets" class="flex flex-col items-center justify-center text-muted-dark w-12 h-8 transition-all hover:bg-surface-variant/10 rounded-full active:scale-90 duration-200 group" href="#">
<span class="material-symbols-outlined group-hover:text-primary-fixed transition-colors" style="font-variation-settings: 'FILL' 0;">target</span>
</a>
<!-- Inactive Tab: push_pin -->
<a aria-label="Pinned" class="flex flex-col items-center justify-center text-muted-dark w-12 h-8 transition-all hover:bg-surface-variant/10 rounded-full active:scale-90 duration-200 group" href="#">
<span class="material-symbols-outlined group-hover:text-primary-fixed transition-colors" style="font-variation-settings: 'FILL' 0;">push_pin</span>
</a>
</nav>
<!-- Desktop Navigation Shell Spacer (Hidden on mobile) -->
<!-- In a real app, this would be a SideNav for desktop layout as per modern web patterns, 
         but adhering strictly to provided JSON which only defines BottomNav for small/mobile -->
<div class="hidden md:block h-[56px] w-full invisible"></div>
</body></html>
