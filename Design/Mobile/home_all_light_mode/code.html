<!DOCTYPE html>

        body {

        }
        /* Custom category tag colors to match constraints while staying minimal */
        .tag-jobs { border-left-color: #3b82f6; }

<body class="font-body-md text-body-md bg-background text-on-background pb-[72px]">
<!-- TopAppBar -->
<header class="bg-surface text-primary font-headline-sm text-headline-sm docked full-width top-0 bg-surface flat no shadows flex justify-between items-center w-full px-container-margin h-14 z-50 sticky">
<div class="flex items-center gap-sm">
<button class="text-on-surface-variant hover:bg-surface-container-high transition-colors p-sm rounded-full flex items-center justify-center active:scale-95 duration-100">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">LinkHive</h1>
</div>
<div class="flex items-center gap-sm text-on-surface-variant">
<button class="hover:bg-surface-container-high transition-colors p-sm rounded-full flex items-center justify-center active:scale-95 duration-100">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
</button>
<button class="hover:bg-surface-container-high transition-colors p-sm rounded-full flex items-center justify-center active:scale-95 duration-100">
<span class="material-symbols-outlined" data-icon="sort">sort</span>
</button>
<button class="hover:bg-surface-container-high transition-colors p-sm rounded-full flex items-center justify-center active:scale-95 duration-100">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<main class="px-container-margin py-md flex flex-col gap-lg">
<!-- Filters -->
<section class="flex gap-sm overflow-x-auto pb-xs scrollbar-hide -mx-container-margin px-container-margin" style="scrollbar-width: none;">
<button class="whitespace-nowrap px-md py-xs rounded-full bg-primary text-on-primary font-label-xs text-label-xs border border-transparent">All</button>
<button class="whitespace-nowrap px-md py-xs rounded-full bg-surface-container-low text-on-surface-variant font-label-xs text-label-xs border border-outline-variant hover:bg-surface-container transition-colors">Jobs</button>
<button class="whitespace-nowrap px-md py-xs rounded-full bg-surface-container-low text-on-surface-variant font-label-xs text-label-xs border border-outline-variant hover:bg-surface-container transition-colors">Socials</button>
<button class="whitespace-nowrap px-md py-xs rounded-full bg-surface-container-low text-on-surface-variant font-label-xs text-label-xs border border-outline-variant hover:bg-surface-container transition-colors">Videos</button>
<button class="whitespace-nowrap px-md py-xs rounded-full bg-surface-container-low text-on-surface-variant font-label-xs text-label-xs border border-outline-variant hover:bg-surface-container transition-colors">Articles</button>
</section>
<!-- Bento Grid Cards -->
<section class="grid grid-cols-2 gap-gutter">
<!-- Card 1: Jobs -->
<article class="bg-surface-container-lowest border border-surface-container rounded-lg p-sm flex flex-col gap-sm border-l-4 tag-jobs shadow-sm hover:shadow-md transition-shadow relative overflow-hidden group">

</div>
<button class="text-outline hover:text-primary transition-colors opacity-0 group-hover:opacity-100">
<span class="material-symbols-outlined text-[18px]" data-icon="more_vert">more_vert</span>
</button>
</div>
<div>
<h2 class="font-card-title text-card-title text-on-surface line-clamp-2">Product Designer at Google</h2>
<p class="font-source-muted text-source-muted text-on-surface-variant mt-xs">careers.google.com</p>
</div>
</article>
<!-- Card 2: Socials -->
<article class="bg-surface-container-lowest border border-surface-container rounded-lg p-sm flex flex-col gap-sm border-l-4 tag-socials shadow-sm hover:shadow-md transition-shadow relative overflow-hidden group">
<div class="flex items-start justify-between">
<div class="w-10 h-10 bg-surface-container rounded flex items-center justify-center text-primary overflow-hidden shrink-0">

</div>
<button class="text-outline hover:text-primary transition-colors opacity-0 group-hover:opacity-100">
<span class="material-symbols-outlined text-[18px]" data-icon="more_vert">more_vert</span>
</button>
</div>
<div>
<h2 class="font-card-title text-card-title text-on-surface line-clamp-2">Lana Del Rey</h2>
<p class="font-source-muted text-source-muted text-on-surface-variant mt-xs">instagram.com</p>
</div>
</article>

<article class="bg-surface-container-lowest border border-surface-container rounded-lg p-sm flex flex-col gap-sm border-l-4 tag-videos shadow-sm hover:shadow-md transition-shadow relative overflow-hidden group">

<div class="w-10 h-10 bg-surface-container rounded flex items-center justify-center text-primary overflow-hidden shrink-0">

</div>
<button class="text-outline hover:text-primary transition-colors opacity-0 group-hover:opacity-100">
<span class="material-symbols-outlined text-[18px]" data-icon="more_vert">more_vert</span>
</button>
</div>
<div>
<h2 class="font-card-title text-card-title text-on-surface line-clamp-2">TEDx: Productivity</h2>
<p class="font-source-muted text-source-muted text-on-surface-variant mt-xs">youtube.com</p>
</div>
</article>

<article class="bg-surface-container-lowest border border-surface-container rounded-lg p-sm flex flex-col gap-sm border-l-4 tag-articles shadow-sm hover:shadow-md transition-shadow relative overflow-hidden group">
<div class="flex items-start justify-between">
<div class="w-10 h-10 bg-surface-container rounded flex items-center justify-center text-primary overflow-hidden shrink-0">
<span class="material-symbols-outlined" data-icon="palette">palette</span>
</div>
<button class="text-outline hover:text-primary transition-colors opacity-0 group-hover:opacity-100">
<span class="material-symbols-outlined text-[18px]" data-icon="more_vert">more_vert</span>
</button>
</div>
<div>
<h2 class="font-card-title text-card-title text-on-surface line-clamp-2">Color Theory 101</h2>
<p class="font-source-muted text-source-muted text-on-surface-variant mt-xs">medium.com</p>
</div>
</article>
</section>
</main>
<!-- FAB -->
<button class="fixed bottom-[80px] right-container-margin w-[56px] h-[56px] bg-primary text-on-primary rounded-full flex items-center justify-center shadow-md hover:bg-surface-tint transition-colors z-40 active:scale-95">
<span class="material-symbols-outlined text-[24px]" data-icon="add">add</span>
</button>
<!-- BottomNavBar -->
<nav class="bg-surface text-primary font-label-xs text-label-xs docked full-width bottom-0 h-[56px] bg-surface flat no shadows fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-2 border-t border-surface-container">

</button>
<!-- Inactive Tabs -->
<button class="flex flex-col items-center justify-center text-on-surface-variant w-12 h-8 hover:bg-surface-variant transition-all active:scale-90 duration-200 rounded-full">
<span class="material-symbols-outlined" data-icon="link">link</span>

<button class="flex flex-col items-center justify-center text-on-surface-variant w-12 h-8 hover:bg-surface-variant transition-all active:scale-90 duration-200 rounded-full">
<span class="material-symbols-outlined" data-icon="content_paste">content_paste</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant w-12 h-8 hover:bg-surface-variant transition-all active:scale-90 duration-200 rounded-full">
<span class="material-symbols-outlined" data-icon="target">target</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant w-12 h-8 hover:bg-surface-variant transition-all active:scale-90 duration-200 rounded-full">
<span class="material-symbols-outlined" data-icon="push_pin">push_pin</span>
</button>
