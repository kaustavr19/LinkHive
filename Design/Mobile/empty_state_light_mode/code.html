<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LinkHive - Empty State</title>
<!-- Material Symbols -->

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "error": "#ba1a1a",
                    "on-secondary-fixed": "#1a1c1c",
                    "surface-container-high": "#e9e8e7",
                    "secondary": "#5d5f5f",
                    "surface-bright": "#fbf9f8",
                    "on-primary-container": "#858383",
                    "on-error": "#ffffff",
                    "on-primary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed-variant": "#454747",
                    "primary-fixed": "#e5e2e1",
                    "on-primary-fixed-variant": "#474646",
                    "on-primary-fixed": "#1c1b1b",
                    "primary": "#000000",
                    "surface-variant": "#e4e2e2",
                    "on-tertiary-container": "#868381",
                    "tertiary": "#000000",

                    "surface-container": "#efeded",
                    "surface": "#fbf9f8",
                    "on-background": "#1b1c1c",
                    "on-surface-variant": "#444748",
                    "inverse-on-surface": "#f2f0f0",
                    "on-tertiary": "#ffffff",
                    "outline-variant": "#c4c7c7",
                    "secondary-fixed": "#e2e2e2",
                    "background": "#fbf9f8",
                    "primary-fixed-dim": "#c9c6c5",
                    "surface-tint": "#5f5e5e",
                    "tertiary-container": "#1d1b1a",
                    "on-tertiary-fixed": "#1d1b1a",

            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "8px",
                    "gutter": "12px",
                    "container-margin": "16px",
                    "xl": "32px",
                    "md": "16px",
                    "xs": "4px",
                    "base": "4px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "source-muted": ["Inter", "sans-serif"],
                    "headline-sm": ["Inter", "sans-serif"],
                    "label-xs": ["Inter", "sans-serif"],
                    "body-md": ["Inter", "sans-serif"],
                    "card-title": ["Inter", "sans-serif"]
            },
            "fontSize": {

                    "label-xs": ["11px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],

      }

<style>
        /* Optional: Add Inter font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        /* Subtle pulse for the FAB to make it inviting */
        @keyframes subtle-pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.1); }
            70% { box-shadow: 0 0 0 10px rgba(0, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0); }
        }
        .fab-highlight {
            animation: subtle-pulse 2s infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col relative selection:bg-surface-variant">
<!-- TopAppBar -->
<header class="fixed top-0 flex justify-between items-center w-full px-container-margin h-14 z-50 bg-surface shadow-sm">
<button aria-label="Menu" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary text-2xl">menu</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary tracking-tight">LinkHive</h1>
<button aria-label="Account" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary text-2xl">account_circle</span>
</button>
</header>
<!-- Main Content Canvas - Empty State -->
<main class="flex-1 flex flex-col items-center justify-center px-container-margin pt-14 pb-[56px]">
<div class="flex flex-col items-center text-center max-w-sm w-full animate-fade-in-up">
<!-- Minimalist Illustration Container -->
<div class="relative w-40 h-40 mb-8 flex items-center justify-center">
<!-- Decorative background elements representing empty slots/archive -->
<div class="absolute inset-0 bg-surface-container rounded-full opacity-50 scale-110"></div>
<div class="absolute inset-2 bg-surface-container-high rounded-full opacity-70"></div>
<div class="relative w-24 h-24 bg-surface rounded-full flex items-center justify-center shadow-sm border border-surface-variant">
<span class="material-symbols-outlined text-5xl text-outline-variant" style="font-variation-settings: 'FILL' 0, 'wght' 300;">
                        hive
                    </span>
</div>
</div>
<!-- Text Content -->
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-2">Your hive is empty</h2>
<p class="font-body-md text-body-md text-on-surface-variant px-4">
                Paste a link to start saving and organizing your digital content.
            </p>
<!-- Contextual Arrow pointing to FAB (subtle) -->
<div class="mt-12 opacity-40 hidden md:block">
<span class="material-symbols-outlined text-3xl animate-bounce">
                    arrow_downward
                </span>
</div>
</div>
</main>
<!-- Floating Action Button (FAB) -->
<button aria-label="Add new link" class="fab-highlight fixed right-container-margin bottom-[80px] z-40 w-[56px] h-[56px] rounded-full bg-primary text-on-primary shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface h-[56px] border-t-0 shadow-[0_-1px_3px_rgba(0,0,0,0.02)]">
<!-- Active Tab: Home -->
<a aria-current="page" aria-label="Home" class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full w-12 h-8 active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</a>
<!-- Inactive Tabs -->
<a aria-label="Links" class="flex flex-col items-center justify-center text-on-surface-variant w-12 h-8 hover:bg-surface-variant rounded-full transition-all duration-200" href="#">
<span class="material-symbols-outlined">link</span>
</a>
<a aria-label="Clipboard" class="flex flex-col items-center justify-center text-on-surface-variant w-12 h-8 hover:bg-surface-variant rounded-full transition-all duration-200" href="#">
<span class="material-symbols-outlined">content_paste</span>
</a>
<a aria-label="Targets" class="flex flex-col items-center justify-center text-on-surface-variant w-12 h-8 hover:bg-surface-variant rounded-full transition-all duration-200" href="#">
<span class="material-symbols-outlined">target</span>
</a>
<a aria-label="Pins" class="flex flex-col items-center justify-center text-on-surface-variant w-12 h-8 hover:bg-surface-variant rounded-full transition-all duration-200" href="#">
<span class="material-symbols-outlined">push_pin</span>
</a>
</nav>
</body></html>
